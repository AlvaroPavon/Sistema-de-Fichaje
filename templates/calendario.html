<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendario de Fichajes</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .cabecera { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; color: white; padding: 15px 30px; border-radius: 8px; margin-bottom: 20px;}
        .btn-accion { padding: 10px 15px; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 14px; font-weight: bold;}
        .btn-azul { background: #3498db; }
        
        #contenedor-calendario {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            height: 75vh; 
        }

        .fc-event { cursor: pointer; border: none !important; }
        .fc-event-title { font-weight: bold; padding: 2px 5px; font-size: 13px;}
        
        /* Dale un fondo distinto a la zona del resumen para que destaque */
        .fc-daygrid-body { background-color: #fdfefe; }
    </style>
</head>
<body>

    <div class="cabecera">
        <h2>Organizador Diario por Horas</h2>
        <div>
            <a href="/dashboard" class="btn-accion btn-azul">Volver al Dashboard</a>
        </div>
    </div>

    <div id="contenedor-calendario">
        <div id='calendar'></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');

            var calendar = new FullCalendar.Calendar(calendarEl, {
                locale: 'es', 
                initialView: 'timeGridDay', 
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'timeGridDay,timeGridWeek,dayGridMonth'
                },
                slotMinTime: '06:00:00', 
                slotMaxTime: '23:00:00', 
                
                // ¡AQUÍ ESTÁ LA MAGIA! Activamos la zona superior y le ponemos texto
                allDaySlot: true, 
                allDayText: 'Total de Horas',
                
                events: '/api/eventos',
                
                eventTimeFormat: {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                }
            });

            calendar.render();
        });
    </script>
</body>
</html>
