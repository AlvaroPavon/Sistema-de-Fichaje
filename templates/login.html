<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Administrador</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #ecf0f1; margin: 0; }
        .caja-login { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; width: 100%; border-radius: 4px; cursor: pointer; margin-top: 10px;}
        .error { color: red; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="caja-login">
        <h2>Panel de Control</h2>
        {% if error %} <div class="error">{{ error }}</div> {% endif %}
        
        <form method="POST">
            <input type="text" name="usuario" placeholder="Usuario (admin)" required>
            <input type="password" name="password" placeholder="Contraseña (1234)" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
