<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Panel de Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .caja-login { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; width: 350px; }
        h2 { color: #2c3e50; margin-bottom: 25px; font-size: 24px; }
        .input-grupo { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #7f8c8d; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 6px; box-sizing: border-box; font-size: 16px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #3498db; }
        button { background-color: #3498db; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: background-color 0.3s; }
        button:hover { background-color: #2980b9; }
        .error-msg { background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; border: 1px solid #f5c6cb; }
        .info-demo { margin-top: 20px; font-size: 12px; color: #bdc3c7; }
    </style>
</head>
<body>

    <div class="caja-login">
        <h2>Administración</h2>
        
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="input-grupo">
                <label>Usuario</label>
                <input type="text" name="usuario" required autofocus placeholder="Introduce usuario">
            </div>
            
            <div class="input-grupo">
                <label>Contraseña</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            
            <button type="submit">INICIAR SESIÓN</button>
        </form>

        <div class="info-demo">
            Acceso restringido para personal autorizado.
        </div>
    </div>

</body>
</html>
