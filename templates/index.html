<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Fichaje Kiosco</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #2c3e50; margin: 0; }
        .tarjeta { background-color: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); text-align: center; width: 90%; max-width: 400px; }
        h1 { color: #333; margin-bottom: 5px;}
        input { width: 100%; padding: 15px; margin: 20px 0; font-size: 30px; text-align: center; border: 2px solid #bdc3c7; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; border: none; padding: 20px; width: 100%; font-size: 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:active { background-color: #2ecc71; }
        #mensaje { margin-top: 20px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="tarjeta">
        <h1>Fichaje</h1>
        <p>Introduce tu ID</p>
        <input type="number" id="id_empleado" placeholder="Ej: 1234" autocomplete="off">
        <button onclick="enviarFichaje()">FICHAR</button>
        <div id="mensaje"></div>
    </div>

    <script>
        function enviarFichaje() {
            const idEmpleado = document.getElementById('id_empleado').value;
            const divMensaje = document.getElementById('mensaje');
            const tokenDispositivo = localStorage.getItem('token_seguridad');

            if (!idEmpleado) {
                mostrarMensaje("Por favor, introduce tu ID.", "red");
                return;
            }

            fetch('/fichar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id_empleado: idEmpleado, token: tokenDispositivo })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    mostrarMensaje(data.error, "red");
                } else {
                    mostrarMensaje(data.mensaje, "green");
                    setTimeout(() => document.getElementById('id_empleado').value = '', 3000);
                }
            })
            .catch(() => mostrarMensaje("Error de conexión.", "red"));
        }

        function mostrarMensaje(texto, color) {
            const div = document.getElementById('mensaje');
            div.style.color = color;
            div.innerText = texto;
            if(color === "green") setTimeout(() => div.innerText = '', 3000);
        }
    </script>
</body>
</html>
