<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Fichaje Oficial</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #2c3e50; margin: 0; }
        .tarjeta { background-color: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center; width: 90%; max-width: 450px; border-top: 8px solid #3498db; }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 28px; }
        p { color: #7f8c8d; margin-bottom: 25px; }
        input { width: 100%; padding: 18px; margin-bottom: 20px; font-size: 32px; text-align: center; border: 2px solid #ecf0f1; border-radius: 12px; box-sizing: border-box; background-color: #f9f9f9; color: #2c3e50; font-weight: bold; }
        input:focus { outline: none; border-color: #3498db; background-color: white; }
        
        /* Contenedor para poner los dos botones en la misma línea */
        .botones-contenedor { display: flex; gap: 15px; }
        
        button { color: white; border: none; padding: 20px; width: 100%; font-size: 22px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: transform 0.1s, opacity 0.2s; }
        button:active { transform: scale(0.96); }
        button:hover { opacity: 0.9; }
        
        /* Colores específicos para cada botón */
        .btn-entrada { background-color: #27ae60; }
        .btn-salida { background-color: #e74c3c; }
        
        #mensaje { margin-top: 25px; font-size: 20px; font-weight: bold; min-height: 1.2em; }
        .error { color: #e74c3c; }
        .exito { color: #27ae60; }
    </style>
</head>
<body>

    <div class="tarjeta">
        <h1>Control Horario</h1>
        <p>Introduce tu ID y selecciona la acción</p>
        
        <input type="text" id="id_empleado" placeholder="Ej: JP123" autocomplete="off" maxlength="10">
        
        <div class="botones-contenedor">
            <button class="btn-entrada" onclick="enviarFichaje('ENTRADA')">ENTRADA</button>
            <button class="btn-salida" onclick="enviarFichaje('SALIDA')">SALIDA</button>
        </div>

        <div id="mensaje"></div>
    </div>

    <script>
        // La función ahora recibe si es ENTRADA o SALIDA
        function enviarFichaje(tipoFichaje) {
            const inputID = document.getElementById('id_empleado');
            const divMensaje = document.getElementById('mensaje');
            const tokenDispositivo = localStorage.getItem('token_seguridad');

            if (!inputID.value.trim()) {
                mostrarMensaje("Introduce tu ID para fichar.", "error");
                return;
            }

            // Añadimos el "tipo" al paquete de datos que enviamos a Python
            fetch('/fichar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    id_empleado: inputID.value,
                    token: tokenDispositivo,
                    tipo: tipoFichaje 
                })
            })
            .then(response => response.json().then(data => ({ status: response.status, body: data })))
            .then(res => {
                if (res.status === 200) {
                    mostrarMensaje(res.body.mensaje, "exito");
                    inputID.value = ''; // Limpiamos la casilla tras fichar
                } else {
                    mostrarMensaje(res.body.error, "error");
                }
            })
            .catch(error => {
                mostrarMensaje("Error de conexión con el servidor.", "error");
            });
        }

        function mostrarMensaje(texto, tipo) {
            const div = document.getElementById('mensaje');
            div.className = tipo;
            div.innerText = texto;
            
            setTimeout(() => {
                div.innerText = '';
                div.className = '';
            }, 4000);
        }

        // Si pulsa Enter, le pedimos que use los botones para evitar errores
        document.getElementById('id_empleado').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                mostrarMensaje("Por favor, pulsa el botón de Entrada o Salida.", "error");
            }
        });
    </script>
</body>
</html>
